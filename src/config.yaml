site:
  name: suleimanov         # ← имя сайта (отображается в <title> и шапке)
  site: 'https://suleimanov.com'  # ← твой домен
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null # ← если не используешь Google Search Console

# Default SEO metadata
metadata:
  title:
    default: Suleimanov
    template: '%s — Suleimanov'   # ← будет "Post title — Suleimanov"
  description: "Личный технический блог Османа Сулейманова. Kotlin, Compose, архитектура, подкапотные механизмы и авторская философия."  # ← SEO-описание
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Suleimanov
    images:
      - url: '~/assets/images/default.png' # ← можешь заменить на свой логотип позже
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@suleimanovs'  # ← если у тебя есть Twitter/X
    site: '@suleimanovs'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
